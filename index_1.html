<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimalist 3D Viewer</title>
  
  <!-- Google Model-Viewer Library for responsive, high-performance 3D rendering -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js"></script>

  <style>
    /* Reset margins and set background to pure white */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #ffffff;
    }

    /* Style the viewer to fill the entire viewport seamlessly */
    model-viewer {
      width: 100%;
      height: 60%;
      background-color: #ffffff;
      --poster-color: #ffffff;
      outline: none;
    }
    body {
        height: 1000px;
    }
    .btn {
        display: flex;
        justify-content: center;
    }
    button
    {
        height: 50px;
        width: 100px;
    }

    .btn {
    display: inline-block;
    padding: 10px 20px;
    background: #00244a;
    color: white;
    text-decoration: none;
    border-radius: 5px;
    }

    .btn_1{
        display: flex;
        justify-content: center;
    }
  </style>
</head>
<body>

  <!-- 
    ==================================================================
    INSERT YOUR 3D MODEL FILE HERE:
    Simply change the 'src' attribute below to point to your local 3D file or online URL.
    Example: src="my-product.glb" or src="assets/mesh.gltf"
    ==================================================================
  -->
  <model-viewer 
    id="viewer"
    src="sim_racing_stand_1.glb" 
    alt="Interactive 3D Model Presentation"
    camera-controls
    auto-rotate
    touch-action="none">
  </model-viewer>
  <div  class="btn_1">
    <a href="index.html" class="btn">Next</a>
  </div >
</body>
</html>
